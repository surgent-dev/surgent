name: Docker - Analytics

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - apps/analytics/**
      - apps/analytics/Dockerfile
      - package.json
      - bun.lock
      - bunfig.toml
      - .github/workflows/docker-analytics.yml

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: surgent/analytics
  ECR_REGISTRY: 784713213970.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        if: github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::784713213970:role/github-actions-ecr
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: github.event_name != 'pull_request'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          labels: |
            org.opencontainers.image.title=surgent/analytics
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/analytics/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run database migrations
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          SERVICE_JSON=$(aws ecs describe-services \
            --cluster surgent-cluster \
            --services surgent-analytics)

          TASK_DEF=$(echo "$SERVICE_JSON" | jq -r '.services[0].taskDefinition')
          NETWORK_CONFIG=$(echo "$SERVICE_JSON" | jq -c '{awsvpcConfiguration: .services[0].networkConfiguration.awsvpcConfiguration}')

          TASK_ARN=$(aws ecs run-task \
            --cluster surgent-cluster \
            --launch-type FARGATE \
            --task-definition "$TASK_DEF" \
            --network-configuration "$NETWORK_CONFIG" \
            --overrides '{"containerOverrides":[{"name":"analytics","command":["bun","run","migrate-storage"]}]}' \
            --query 'tasks[0].taskArn' \
            --output text)

          aws ecs wait tasks-stopped \
            --cluster surgent-cluster \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster surgent-cluster \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[?name==`analytics`][0].exitCode' \
            --output text)

          if [ "$EXIT_CODE" != "0" ]; then
            aws ecs describe-tasks \
              --cluster surgent-cluster \
              --tasks "$TASK_ARN" \
              --query 'tasks[0].{stopCode:stopCode,stoppedReason:stoppedReason,containers:containers[*].{name:name,exitCode:exitCode,reason:reason}}'
            exit 1
          fi

      - name: Deploy to ECS
        if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
        run: |
          aws ecs update-service \
            --cluster surgent-cluster \
            --service surgent-analytics \
            --force-new-deployment
