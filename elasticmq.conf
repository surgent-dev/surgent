include "base.conf"

pekko.http.parsing {
  illegal-header-warnings = off
  ignore-illegal-header-for = ["user-agent", "authorization"]
}

queues {
  webhooks {
    defaultVisibilityTimeout = 30
    delay = 0
    receiveMessageWait = 20
    deadLettersQueue {
      name = "webhooks_dlq"
      maxReceiveCount = 3
    }
  }

  webhooks_dlq {
    defaultVisibilityTimeout = 30
    delay = 0
    receiveMessageWait = 20
  }
}

rest-sqs {
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  enabled = true
  sqs-limits = strict
}
