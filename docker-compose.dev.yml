# Local development infrastructure
#
# Production uses ECR + ECS only. This file is local development infra only.
#
# Usage:
#   Start:  docker compose -f docker-compose.dev.yml up -d
#   Stop:   docker compose -f docker-compose.dev.yml down
#   Reset:  docker compose -f docker-compose.dev.yml down -v
#
# If you already have an existing postgres_data volume from an older setup,
# run the reset command once so the init script can create surgent_analytics.
#
# Databases:
#   PostgreSQL:   surgent (web/worker), surgent_analytics (analytics)
#
# Connection URLs for .env.local:
#   apps/worker/.env.local:
#     DATABASE_URL=postgresql://surgent:password@localhost:5432/surgent
#   apps/analytics/.env.local:
#     DATABASE_URL=postgresql://surgent:password@localhost:5432/surgent_analytics

services:
  postgres:
    image: postgres:18
    container_name: postgres-dev
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: surgent
      POSTGRES_USER: surgent
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init/01-create-analytics-db.sh:/docker-entrypoint-initdb.d/01-create-analytics-db.sh:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U surgent -d surgent']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
