# Development Docker Compose
#
# Usage:
#   Start:  docker-compose -f docker-compose.dev.yml up -d
#   Stop:   docker-compose -f docker-compose.dev.yml down
#   Logs:   docker-compose -f docker-compose.dev.yml logs -f postgres
#
# DATABASE_URL for your local development:
#   postgres://surgent:password@localhost:5433/surgent
#
# Data persistence:
#   A named volume is used so data survives container restarts.
#   To completely reset: docker-compose -f docker-compose.dev.yml down -v

services:
  postgres:
    image: postgres:18
    container_name: postgres-dev
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: surgent
      POSTGRES_USER: surgent
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data/18
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U surgent -d surgent']
      interval: 10s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:latest
    container_name: inngest-dev
    restart: unless-stopped
    ports:
      - '8288:8288'
    environment:
      INNGEST_EVENT_KEY: local
      INNGEST_SIGNING_KEY: local
      INNGEST_LOG_LEVEL: info
    command: inngest dev -u http://host.docker.internal:4000/api/inngest --no-discovery

volumes:
  postgres_data:
