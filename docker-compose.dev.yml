# Development Docker Compose
#
# Usage:
#   Start:  docker-compose -f docker-compose.dev.yml up -d
#   Stop:   docker-compose -f docker-compose.dev.yml down
#   Logs:   docker-compose -f docker-compose.dev.yml logs -f postgres
#
# DATABASE_URL for your local development:
#   postgres://surgent:password@localhost:5433/surgent
#
# Data persistence:
#   A named volume is used so data survives container restarts.
#   To completely reset: docker-compose -f docker-compose.dev.yml down -v

services:
  postgres:
    image: postgres:18
    container_name: postgres-dev
    restart: unless-stopped
    ports:
      - '5433:5432'
    environment:
      POSTGRES_DB: surgent
      POSTGRES_USER: surgent
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data/18
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U surpay -d surpay']
      interval: 10s
      timeout: 5s
      retries: 5

  sqs:
    image: softwaremill/elasticmq-native:latest
    container_name: elasticmq
    ports:
      - "9324:9324"  # SQS-compatible REST endpoint
      - "9325:9325"  # (optional) UI / additional port depending on image
    environment:
      # dev environment so listen on all
      - ELASTICMQ_NODE_ADDRESS=0.0.0.0
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9324/ || exit 1"]
      interval: 10s
      timeout: 2s
      retries: 5


volumes:
  postgres_data:
