version: "3.8"

services:
  coder:
    image: ghcr.io/foreveranapple/surgent-coder:latest
    container_name: surgent-coder
    env_file: packages/opencode/.env
    ports:
      - "4096:4096"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4096/global/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - surgent-network

  worker:
    image: ghcr.io/foreveranapple/surgent-worker:latest
    container_name: surgent-worker
    env_file: apps/worker/.env
    environment:
      - OPENCODE_URL=http://coder:4096
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    depends_on:
      coder:
        condition: service_healthy
    networks:
      - surgent-network

networks:
  surgent-network:
    driver: bridge
